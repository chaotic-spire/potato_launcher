name: Build & deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ['Check']
    types:
      - completed
  push:
    branches:
      - master
    paths:
      - .github/workflows/build.yml

jobs:
  binaries:
    name: Build binaries
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ['windows-2025', 'ubuntu-latest', 'macos-latest']

    steps:
      - uses: actions/checkout@v4

      - name: Install Brew and AWS CLI (macOS)
        if: ${{ startsWith(matrix.os, 'macos') }}
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          brew update
          brew install awscli
          aws --version

      - name: Install AWS CLI (Linux)
        if: ${{ startsWith(matrix.os, 'ubuntu') }}
        run: |
          sudo snap install aws-cli --classic
          aws --version

      - name: Install AWS CLI (Windows)
        if: ${{ startsWith(matrix.os, 'windows') }}
        shell: pwsh
        run: |
          winget install -e --id Amazon.AWSCLI
          aws --version

      - name: Verify Cloud.ru S3 connection
        run: |
          echo "Testing connection to Cloud.ru S3..."
          aws s3 ls --endpoint-url $AWS_ENDPOINT_URL || {
            echo "Connection failed. Please check:"
            echo "1. Your CLOUDRU_ACCESS_KEY_ID secret"
            echo "2. Your CLOUDRU_SECRET_ACCESS_KEY secret"
            echo "3. Your S3 service is enabled in Cloud.ru"
            exit 1
          }

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: "build-${{ matrix.os }}"

      - name: Install configure.py dependencies (Windows)
        if: ${{ startsWith(matrix.os, 'windows') }}
        shell: pwsh
        run: |
          # imagemagick is preinstalled
          pip install tomlkit httpx

      - name: Install configure.py dependencies (Ubuntu)
        if: ${{ startsWith(matrix.os, 'ubuntu') }}
        shell: bash
        run: |
          sudo apt update
          sudo apt install -y python3 python3-tomlkit python3-httpx imagemagick

      - name: Install configure.py dependencies (macOS)
        if: ${{ startsWith(matrix.os, 'macos') }}
        shell: bash
        run: |
          brew install imagemagick
          pip install tomlkit httpx

      - name: Set environment variables (Linux / macOS)
        if: ${{ !startsWith(matrix.os, 'windows') }}
        shell: bash
        run: |
          # LAUNCHER_NAME, DATA_LAUNCHER_NAME and VERSION are used by CI script
          if [ -n "${{ vars.LAUNCHER_NAME }}" ]; then
            LAUNCHER_NAME="${{ vars.LAUNCHER_NAME }}"
          else
            # load LAUNCHER_NAME from build.env (must have format LAUNCHER_NAME=...)
            export "$(grep '^LAUNCHER_NAME=' build.env || true)"
            # grep export will have already set LAUNCHER_NAME if present
          fi

          if [ -z "$LAUNCHER_NAME" ]; then
            echo "LAUNCHER_NAME not set"
            exit 1
          fi

          echo "LAUNCHER_NAME=$LAUNCHER_NAME" >> $GITHUB_ENV
          DATA_LAUNCHER_NAME=$(echo "$LAUNCHER_NAME" | tr '[:upper:]' '[:lower:]' | tr -d "'" | tr ' ' '_')
          echo "DATA_LAUNCHER_NAME=$DATA_LAUNCHER_NAME" >> $GITHUB_ENV
          echo "VERSION=$GITHUB_SHA" >> $GITHUB_ENV

      - name: Set environment variables (Windows)
        if: ${{ startsWith(matrix.os, 'windows') }}
        shell: pwsh
        run: |
          # LAUNCHER_NAME, DATA_LAUNCHER_NAME and VERSION are used by CI script
          if ('${{ vars.LAUNCHER_NAME }}' -ne '') {
            $launcher = '${{ vars.LAUNCHER_NAME }}'
          } else {
            # parse build.env for LAUNCHER_NAME=
            $text = Get-Content -Raw -ErrorAction SilentlyContinue -Path build.env
            if ($null -eq $text) {
              Write-Error "build.env not found and LAUNCHER_NAME not set as a repo var"
              exit 1
            }
            if ($text -match '(^|\r?\n)LAUNCHER_NAME=(.*?)(\r?\n|$)') {
              $launcher = $Matches[2].Trim()
            } else {
              Write-Error "LAUNCHER_NAME not found in build.env"
              exit 1
            }
          }

          if ([string]::IsNullOrWhiteSpace($launcher)) {
            Write-Error "LAUNCHER_NAME not set"
            exit 1
          }

          # create DATA_LAUNCHER_NAME: lowercase, remove single quotes, replace spaces with _
          $data = $launcher.ToLower().Replace("'", "").Replace(" ", "_")

          Add-Content -Path $Env:GITHUB_ENV -Value "LAUNCHER_NAME=$launcher"
          Add-Content -Path $Env:GITHUB_ENV -Value "DATA_LAUNCHER_NAME=$data"
          Add-Content -Path $Env:GITHUB_ENV -Value "VERSION=${{ github.sha }}"

      - name: Build the launcher (Windows)
        if: ${{ startsWith(matrix.os, 'windows') }}
        shell: pwsh
        env:
          VERSION_MANIFEST_URL: ${{ vars.VERSION_MANIFEST_URL }}
          AUTO_UPDATE_BASE: ${{ vars.AUTO_UPDATE_BASE }}
          LAUNCHER_APP_ID: ${{ vars.LAUNCHER_APP_ID }}
          LAUNCHER_ICON: ${{ vars.LAUNCHER_ICON }}
          LAUNCHER_DESCRIPTION: ${{ vars.LAUNCHER_DESCRIPTION }}
          LAUNCHER_KEYWORDS: ${{ vars.LAUNCHER_KEYWORDS }}
        run: |
          # Ensure build dir exists
          New-Item -ItemType Directory -Force -Path build | Out-Null

          # configure step
          python packaging/configure.py

          # Build and move
          cargo build --bin launcher --profile release-lto

          $exeSrc = "target\release-lto\launcher.exe"
          $exeDst = "build\$($Env:LAUNCHER_NAME).exe"
          if (-Not (Test-Path $exeSrc)) {
            Write-Error "Expected built exe not found: $exeSrc"
            exit 1
          }
          Move-Item -Path $exeSrc -Destination $exeDst -Force

          Set-Content -Path "build\version_windows.txt" -Value $Env:VERSION

      - name: Build the launcher (Ubuntu)
        if: ${{ startsWith(matrix.os, 'ubuntu') }}
        shell: bash
        env:
          VERSION_MANIFEST_URL: ${{ vars.VERSION_MANIFEST_URL }}
          AUTO_UPDATE_BASE: ${{ vars.AUTO_UPDATE_BASE }}
          LAUNCHER_APP_ID: ${{ vars.LAUNCHER_APP_ID }}
          LAUNCHER_ICON: ${{ vars.LAUNCHER_ICON }}
          LAUNCHER_DESCRIPTION: ${{ vars.LAUNCHER_DESCRIPTION }}
          LAUNCHER_KEYWORDS: ${{ vars.LAUNCHER_KEYWORDS }}
        run: |
          python packaging/configure.py
          mkdir -p build

          cargo build --bin launcher --profile release-lto
          mv "target/release-lto/launcher" "build/${DATA_LAUNCHER_NAME}"
          echo "$VERSION" > build/version_linux.txt

      - name: Build the launcher (macOS)
        if: ${{ startsWith(matrix.os, 'macos') }}
        shell: bash
        env:
          VERSION_MANIFEST_URL: ${{ vars.VERSION_MANIFEST_URL }}
          AUTO_UPDATE_BASE: ${{ vars.AUTO_UPDATE_BASE }}
          LAUNCHER_APP_ID: ${{ vars.LAUNCHER_APP_ID }}
          LAUNCHER_ICON: ${{ vars.LAUNCHER_ICON }}
          LAUNCHER_DESCRIPTION: ${{ vars.LAUNCHER_DESCRIPTION }}
          LAUNCHER_KEYWORDS: ${{ vars.LAUNCHER_KEYWORDS }}
        run: |
          python packaging/configure.py
          mkdir -p build

          which cargo-bundle || cargo install cargo-bundle
          rustup target add x86_64-apple-darwin aarch64-apple-darwin

          # Build Intel binary directly (with older deployment target)
          export MACOSX_DEPLOYMENT_TARGET=10.12
          cargo build --bin launcher --profile release-lto --target x86_64-apple-darwin

          # Build ARM binary as part of bundle (with newer deployment target)
          export MACOSX_DEPLOYMENT_TARGET=11.0
          cargo bundle --package launcher --bin launcher --profile release-lto --target aarch64-apple-darwin

          mkdir -p app
          mv "target/aarch64-apple-darwin/release-lto/bundle/osx/$LAUNCHER_NAME.app" "app/$LAUNCHER_NAME.app"

          # Update permission descriptions (required for simple voice chat and some other mods)
          plutil -replace NSCameraUsageDescription \
            -string "A Minecraft mod wants to access your camera." \
            "app/$LAUNCHER_NAME.app/Contents/Info.plist"
          plutil -replace NSMicrophoneUsageDescription \
            -string "A Minecraft mod wants to access your microphone." \
            "app/$LAUNCHER_NAME.app/Contents/Info.plist"
          plutil -insert NSEnableAutomaticCustomizeTouchBarMenuItem \
            -bool false \
            "app/$LAUNCHER_NAME.app/Contents/Info.plist"
          plutil -insert NSFunctionBarAPIEnabled \
            -bool false \
            "app/$LAUNCHER_NAME.app/Contents/Info.plist"

          # Create universal binary
          lipo -create -output "app/$LAUNCHER_NAME.app/Contents/MacOS/launcher" \
            "target/x86_64-apple-darwin/release-lto/launcher" \
            "app/$LAUNCHER_NAME.app/Contents/MacOS/launcher"

          codesign --force --deep --sign - "app/$LAUNCHER_NAME.app"

          ln -s /Applications app/Applications

          DMG_FILENAME="${LAUNCHER_NAME}.dmg"

          # CI runner sometimes fails with "hdiutil: create failed - Resource busy", so retry a few times
          retry=0
          max_retries=5
          until [ $retry -ge $max_retries ]
          do
            hdiutil create "$DMG_FILENAME" -ov -volname "$LAUNCHER_NAME" -fs HFS+ -srcfolder "app/" && break
            retry=$((retry+1))
            echo "Retrying hdiutil create... ($retry/$max_retries)"
            sleep 5
          done

          mv "$DMG_FILENAME" build/

          mv "app/$LAUNCHER_NAME.app" "app/update.app"
          tar -czvf "build/${DATA_LAUNCHER_NAME}_macos.tar.gz" -C app "update.app"

          echo "$VERSION" > build/version_macos.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.S3_REGION }}

      - name: Sync to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          aws s3 sync build/ s3://${{ secrets.S3_NAME }} --endpoint-url ${{ secrets.S3_ENDPOINT }} --region ${{ secrets.S3_REGION }}
